<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colección Mágica Disney</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="disney-app">
    <header class="disney-app__top">
      <div class="magic-sphere"></div>
      <h1 class="disney-title">Disney Wiki</h1>
    </header>

    <section class="disney-app__main">
      <form id="searchForm" class="search__form">
        <input id="searchInput" class="search__input" type="text" placeholder="Ej. Mickey Mouse, Elsa, Simba..." autocomplete="off" />
        <button id="searchButton" class="search__button" type="submit">Buscar</button>
        <button id="resetButton" class="search__reset" type="button">Reiniciar</button>
      </form>

      <p id="status" class="status"></p>

      <div id="grid" class="grid"></div>

      <div class="actions">
        <button id="loadMoreButton" class="load-more" type="button">Cargar más personajes</button>
      </div>
    </section>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal__backdrop" data-close></div>
    <div class="modal__card">
      <button class="modal__close" type="button" data-close>&times;</button>
      <div id="modalBody" class="modal__body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
